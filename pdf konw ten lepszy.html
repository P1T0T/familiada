<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familiada JSON → PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    background:#0f172a;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

textarea{
    width:100%;
    height:260px;
    background:#111827;
    color:#00ff9d;
    border:2px solid #1e293b;
    border-radius:18px;
    padding:20px;
    font-size:14px;
    resize:vertical;
    outline:none;
}

textarea:focus{
    border-color:#00ff9d;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
    margin-bottom:30px;
}

button{
    border:none;
    border-radius:14px;
    padding:14px 24px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.previewBtn{
    background:#2563eb;
    color:white;
}

.previewBtn:hover{
    background:#3b82f6;
    transform:translateY(-2px);
}

.pdfBtn{
    background:#00b86b;
    color:white;
}

.pdfBtn:hover{
    background:#00d67d;
    transform:translateY(-2px);
}

#preview{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
    gap:20px;
}

.card{
    background:linear-gradient(145deg,#1e293b,#111827);
    border-radius:22px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.06);
    page-break-inside:avoid;
}

.questionNumber{
    color:#00ff9d;
    font-size:14px;
    font-weight:bold;
    margin-bottom:12px;
    letter-spacing:1px;
}

.questionText{
    font-size:24px;
    font-weight:bold;
    line-height:1.3;
    margin-bottom:22px;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.answer{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:12px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.answerText{
    font-size:17px;
}

.points{
    background:#00ff9d;
    color:black;
    font-weight:bold;
    padding:6px 12px;
    border-radius:999px;
    min-width:70px;
    text-align:center;
}

@media(max-width:700px){

    body{
        padding:15px;
    }

    h1{
        font-size:30px;
    }

    #preview{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="container">

<h1>Familiada JSON → PDF</h1>
<div class="subtitle">
Nowoczesny eksport PDF • Polskie znaki • Ładne karty pytań
</div>

<textarea id="jsonInput" placeholder="Wklej tutaj JSON..."></textarea>

<div class="buttons">
    <button class="previewBtn" onclick="generatePreview()">
        Generuj podgląd
    </button>

    <button class="pdfBtn" onclick="downloadPDF()">
        Pobierz PDF
    </button>
</div>

<div id="preview"></div>

</div>

<script>

function generatePreview(){

    const input = document.getElementById('jsonInput').value;

    let data;

    try{
        data = JSON.parse(input);
    }
    catch(e){
        alert('Błędny JSON!');
        return;
    }

    const preview = document.getElementById('preview');

    preview.innerHTML = '';

    Object.keys(data).forEach((key)=>{

        const q = data[key];

        const card = document.createElement('div');
        card.className = 'card';

        let answersHTML = '';

        q.answers.forEach((a,index)=>{

            answersHTML += `
            <div class="answer">
                <div class="answerText">
                    ${index+1}. ${a.text}
                </div>

                <div class="points">
                    ${a.points || 0} pkt
                </div>
            </div>
            `;

        });

        card.innerHTML = `
            <div class="questionNumber">${key}</div>
            <div class="questionText">${q.text}</div>
            <div class="answers">
                ${answersHTML}
            </div>
        `;

        preview.appendChild(card);

    });

}

async function downloadPDF(){

    const preview = document.getElementById('preview');

    if(preview.innerHTML.trim() === ''){
        alert('Najpierw wygeneruj podgląd!');
        return;
    }

    const canvas = await html2canvas(preview,{
        scale:1,
        backgroundColor:'#0f172a',
        useCORS:true
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.72);

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF('p','mm','a4');

    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();

    const imgWidth = pdfWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData,'JPEG',0,position,imgWidth,imgHeight);;

    heightLeft -= pdfHeight;

    while(heightLeft > 0){

        position = heightLeft - imgHeight;

        pdf.addPage();
        pdf.addImage(imgData,'JPEG',0,position,imgWidth,imgHeight);

        heightLeft -= pdfHeight;

    }

    pdf.save('familiada.pdf');

}

</script>

</body>
</html>
